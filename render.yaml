services:
  - type: web
    name: gymflow
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        value: ./data/gym.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: INSTRUCTOR_PHONE_NUMBER
        sync: false
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: gymflow-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
